<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Docente - Caccia al Tesoro</title>
    <style>
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f7fa;padding:20px;color:#333}
        h1{text-align:center;color:#1a2a6c;margin-bottom:20px}
        .stats{display:flex;gap:15px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
        .card{background:white;padding:15px 25px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);text-align:center;min-width:120px}
        .card h3{margin:0;font-size:1.8rem;color:#2e7d32}
        .card p{margin:5px 0 0;color:#666;font-size:0.9rem}
        table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
        th,td{padding:12px 15px;text-align:left;border-bottom:1px solid #eee}
        th{background:#1a2a6c;color:white;font-weight:600}
        tr:hover{background:#f8f9fa}
        .ok{color:#2e7d32;font-weight:bold}
        .no{color:#c62828;font-weight:bold}
        .completed{background:#e8f5e9;font-weight:bold;color:#1b5e20}
        .empty{text-align:center;padding:40px;color:#888}
        .btn-clear{background:#ef5350;color:white;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;margin:10px 0}
        .btn-clear:hover{background:#d32f2f}
        .filter{margin:10px 0;text-align:center}
        .filter select{padding:8px 15px;border-radius:20px;border:1px solid #ddd}
    </style>
</head>
<body>
    <h1>📊 Dashboard Docente</h1>
    <div class="stats">
        <div class="card"><h3 id="total">0</h3><p>Eventi totali</p></div>
        <div class="card"><h3 id="correct">0</h3><p>Risposte corrette</p></div>
        <div class="card"><h3 id="wrong">0</h3><p>Risposte errate</p></div>
        <div class="card"><h3 id="completed">0</h3><p>Partite completate 🎉</p></div>
        <div class="card"><h3 id="students">0</h3><p>Squadre attive</p></div>
    </div>
    
    <div class="filter">
        <label>Filtra: </label>
        <select id="filterType" onchange="applyFilter()">
            <option value="all">Tutti gli eventi</option>
            <option value="completato">Solo completamenti 🎉</option>
            <option value="risposta_corretta">Solo risposte corrette ✅</option>
            <option value="risposta_sbagliata">Solo errori ❌</option>
        </select>
    </div>
    
    <button class="btn-clear" onclick="clearAll()">🗑️ Svuota tutto</button>
    
    <div id="table-container">
        <table id="results">
            <thead>
                <tr>
                    <th>Squadra</th>
                    <th>Domanda / Evento</th>
                    <th>Risposta</th>
                    <th>Esito</th>
                    <th>Ora</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
        <div id="empty-msg" class="empty">Nessun evento ancora. I dati appariranno qui in tempo reale...<br><small>Assicurati che gli studenti stiano giocando!</small></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        // ✅ URL CORRETTO - STESSO DELL'APP STUDENTI!
        const firebaseConfig = {
            databaseURL: "https://caccia-al-tesoro-a9466-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const tbody = document.getElementById('tbody');
        const emptyMsg = document.getElementById('empty-msg');
        let events = [], students = new Set(), completedCount = 0, correctCount = 0, wrongCount = 0;

        // ✅ ASCOLTA IL PERCORSO GIUSTO: 'risposte'
        db.ref('risposte').on('child_added', snap => {
            const e = snap.val();
            if(!e) return;
            
            emptyMsg.style.display = 'none';
            students.add(e.studente);
            
            // Conta per statistiche
            if(e.tipo === 'completato') {
                completedCount++;
            } else if(e.esito === true) {
                correctCount++;
            } else if(e.esito === false) {
                wrongCount++;
            }
            
            updateStats();
            renderEvent(e);
        });

        function renderEvent(e){
            events.unshift({...e, id: Date.now()});
            const row = document.createElement('tr');
            
            // Evidenzia i completamenti
            if(e.tipo === 'completato') {
                row.classList.add('completed');
            }
            
            // Icona e testo esito
            let esitoIcon = '', esitoText = '';
            if(e.tipo === 'completato') {
                esitoIcon = '🎉';
                esitoText = 'PARTITA COMPLETATA!';
            } else if(e.esito === true) {
                esitoIcon = '✅';
                esitoText = 'Corretta';
            } else if(e.esito === false) {
                esitoIcon = '❌';
                esitoText = 'Errata';
            } else {
                esitoIcon = '📝';
                esitoText = '-';
            }
            
            // Formatta data/ora
            const date = new Date(e.ora);
            const timeStr = date.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
            const dateStr = date.toLocaleDateString('it-IT');
            
            row.innerHTML = `
                <td><strong>${e.studente || 'Anonimo'}</strong></td>
                <td>${e.domanda || '-'}</td>
                <td>${e.risposta ? `<em>"${e.risposta}"</em>` : '-'}</td>
                <td class="${e.esito || e.tipo==='completato' ? 'ok' : 'no'}">${esitoIcon} ${esitoText}</td>
                <td>${timeStr}<br><small style="color:#888">${dateStr}</small></td>
            `;
            
            tbody.insertBefore(row, tbody.firstChild);
        }

        function applyFilter(){
            const filter = document.getElementById('filterType').value;
            tbody.innerHTML = '';
            
            const filtered = filter === 'all' ? events : 
                           filter === 'completato' ? events.filter(e => e.tipo === 'completato') :
                           filter === 'risposta_corretta' ? events.filter(e => e.esito === true && e.tipo !== 'completato') :
                           events.filter(e => e.esito === false);
            
            if(filtered.length === 0){
                emptyMsg.style.display = 'block';
                emptyMsg.textContent = 'Nessun evento con questo filtro.';
                return;
            }
            emptyMsg.style.display = 'none';
            
            filtered.forEach(e => {
                const row = document.createElement('tr');
                if(e.tipo === 'completato') row.classList.add('completed');
                
                let esitoIcon = '', esitoText = '';
                if(e.tipo === 'completato') {
                    esitoIcon = '🎉';
                    esitoText = 'PARTITA COMPLETATA!';
                } else if(e.esito === true) {
                    esitoIcon = '✅';
                    esitoText = 'Corretta';
                } else if(e.esito === false) {
                    esitoIcon = '❌';
                    esitoText = 'Errata';
                }
                
                const date = new Date(e.ora);
                const timeStr = date.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
                const dateStr = date.toLocaleDateString('it-IT');
                
                row.innerHTML = `
                    <td><strong>${e.studente || 'Anonimo'}</strong></td>
                    <td>${e.domanda || '-'}</td>
                    <td>${e.risposta ? `<em>"${e.risposta}"</em>` : '-'}</td>
                    <td class="${e.esito || e.tipo==='completato' ? 'ok' : 'no'}">${esitoIcon} ${esitoText}</td>
                    <td>${timeStr}<br><small style="color:#888">${dateStr}</small></td>
                `;
                tbody.appendChild(row);
            });
        }

        function updateStats(){
            document.getElementById('total').textContent = events.length;
            document.getElementById('correct').textContent = correctCount;
            document.getElementById('wrong').textContent = wrongCount;
            document.getElementById('completed').textContent = completedCount;
            document.getElementById('students').textContent = students.size;
        }

        function clearAll(){
            if(confirm('⚠️ Vuoi davvero cancellare TUTTI i dati?')){
                db.ref('risposte').remove();
                tbody.innerHTML = '';
                events = [];
                correctCount = 0; wrongCount = 0; completedCount = 0;
                students.clear();
                updateStats();
                emptyMsg.style.display = 'block';
                emptyMsg.textContent = 'Dati svuotati. In attesa di nuove partite...';
            }
        }
    </script>
</body>
</html>
