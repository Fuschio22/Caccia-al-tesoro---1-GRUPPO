<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Dashboard Docente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header Dashboard */
        .dashboard-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .dashboard-header h1 {
            color: #1a2b5a;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* Stats Cards */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 24px 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: transform 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: #2e7d32;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        /* Filtro */
        .filter-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .filter-container label {
            font-weight: 600;
            color: #333;
        }

        .filter-container select {
            padding: 10px 40px 10px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            background-color: white;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }

        .filter-container select:hover {
            border-color: #1a2b5a;
        }

        /* Bottone Svuota */
        .btn-svuota {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-bottom: 20px;
        }

        .btn-svuota:hover {
            background-color: #c0392b;
            transform: translateY(-1px);
        }

        /* Tabella */
        .table-wrapper {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #1a2b5a;
        }

        thead th {
            color: white;
            padding: 18px 20px;
            text-align: left;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        thead th:first-child { padding-left: 30px; }
        thead th:last-child { padding-right: 30px; }

        tbody tr {
            border-bottom: 1px solid #eef0f3;
            transition: background-color 0.2s ease;
        }

        tbody tr:hover {
            background-color: #f8f9fb;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        td {
            padding: 16px 20px;
            font-size: 15px;
            line-height: 1.6;
            vertical-align: top;
        }

        td:first-child { padding-left: 30px; }
        td:last-child { padding-right: 30px; }

        /* Colonne */
        .col-squadra {
            font-weight: 700;
            color: #333;
            white-space: nowrap;
            min-width: 120px;
        }

        .col-domanda {
            color: #444;
            min-width: 350px;
        }

        .col-risposta {
            min-width: 200px;
            font-style: normal;
            font-family: inherit;
            font-weight: 500;
            color: #444;
        }

        .col-esito {
            white-space: nowrap;
            min-width: 150px;
            font-weight: 700;
        }

        .col-ora {
            white-space: nowrap;
            min-width: 120px;
            font-size: 14px;
            color: #333;
            font-weight: 600;
        }

        .ora-data {
            display: block;
            font-size: 13px;
            color: #999;
            font-weight: 400;
            margin-top: 2px;
        }

        /* Riga Partita Iniziata */
        .row-inizio {
            background-color: #e3f2fd !important;
        }

        .row-inizio .col-domanda {
            color: #1565c0;
            font-weight: 700;
        }

        /* Riga Partita Completata */
        .row-completata {
            background-color: #e8f5e9 !important;
        }

        .row-completata .col-domanda {
            color: #2e7d32;
            font-weight: 700;
        }

        /* Riga Errata */
        .row-errata {
            background-color: #fef0f0;
        }

        /* Icone esito */
        .esito-corretta {
            color: #2e7d32;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .esito-corretta .check-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            background-color: #4caf50;
            border-radius: 4px;
            color: white;
            font-size: 14px;
        }

        .esito-errata {
            color: #c62828;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .esito-errata .x-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            background-color: #e53935;
            border-radius: 4px;
            color: white;
            font-size: 14px;
        }

        .esito-completata {
            color: #2e7d32;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .emoji {
            margin-right: 8px;
        }

        @media (max-width: 768px) {
            table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="dashboard-header">
        <h1>📊 Dashboard Docente</h1>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-number" id="statEventi">0</div>
            <div class="stat-label">Eventi totali</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="statCorrette">0</div>
            <div class="stat-label">Risposte corrette</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="statErrate">0</div>
            <div class="stat-label">Risposte errate</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="statCompletate">0</div>
            <div class="stat-label">Partite completate 🎉</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="statSquadre">0</div>
            <div class="stat-label">Squadre attive</div>
        </div>
    </div>

    <div class="filter-container">
        <label for="filtro">Filtra:</label>
        <select id="filtro" onchange="applicaFiltro()">
            <option value="tutti">Tutti gli eventi</option>
            <option value="inizio">Inizi partita</option>
            <option value="corrette">Risposte corrette</option>
            <option value="errate">Risposte errate</option>
            <option value="completate">Partite completate</option>
        </select>
    </div>

    <button class="btn-svuota" onclick="svuotaTutto()">
        <span>🗑</span> Svuota tutto
    </button>

    <div class="table-wrapper">
        <table id="quizTable">
            <thead>
                <tr>
                    <th>Squadra</th>
                    <th>Domanda / Evento</th>
                    <th>Risposta</th>
                    <th>Esito</th>
                    <th>Ora</th>
                </tr>
            </thead>
            <tbody id="quizBody"></tbody>
        </table>
    </div>
</div>

<script>
    // DATI DEL QUIZ
    const quizData = [
        {
            tipo: 'inizio',
            squadra: "fsdfsdfd",
            domanda: "🎮 PARTITA INIZIATA",
            risposta: "-",
            esito: "info",
            timestamp: new Date(Date.now() - 3600000) // 1 ora fa
        },
        {
            tipo: 'domanda',
            squadra: "fsdfsdfd",
            domanda: "In quale città siamo?",
            risposta: "venezia",
            esito: "corretta",
            timestamp: new Date()
        }
    ];

    // FUNZIONI DI UTILITÀ
    function formattaOra(data) {
        return data.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    }

    function formattaData(data) {
        return data.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function aggiungiEvento(tipo, squadra, domanda, risposta, esito) {
        const evento = {
            tipo: tipo,
            squadra: squadra,
            domanda: domanda,
            risposta: risposta,
            esito: esito,
            timestamp: new Date()
        };
        quizData.push(evento);
        renderTable();
        updateStats();
    }

    function renderTable() {
        const tbody = document.getElementById('quizBody');
        const filtro = document.getElementById('filtro').value;
        tbody.innerHTML = '';

        let datiFiltrati = quizData;
        if (filtro !== 'tutti') {
            if (filtro === 'inizio') {
                datiFiltrati = quizData.filter(item => item.tipo === 'inizio');
            } else if (filtro === 'corrette') {
                datiFiltrati = quizData.filter(item => item.esito === 'corretta');
            } else if (filtro === 'errate') {
                datiFiltrati = quizData.filter(item => item.esito === 'errata');
            } else if (filtro === 'completate') {
                datiFiltrati = quizData.filter(item => item.tipo === 'completata');
            }
        }

        // Ordina per timestamp (più recente prima)
        datiFiltrati.sort((a, b) => b.timestamp - a.timestamp);

        datiFiltrati.forEach((item) => {
            const tr = document.createElement('tr');

            if (item.tipo === 'inizio') {
                tr.classList.add('row-inizio');
            } else if (item.tipo === 'completata') {
                tr.classList.add('row-completata');
            } else if (item.esito === 'errata') {
                tr.classList.add('row-errata');
            }

            // Squadra
            const tdSquadra = document.createElement('td');
            tdSquadra.className = 'col-squadra';
            tdSquadra.textContent = item.squadra;
            tr.appendChild(tdSquadra);

            // Domanda
            const tdDomanda = document.createElement('td');
            tdDomanda.className = 'col-domanda';
            if (item.tipo === 'inizio') {
                tdDomanda.innerHTML = `<span class="emoji">🎮</span>${item.domanda.replace('🎮 ', '')}`;
            } else if (item.tipo === 'completata') {
                tdDomanda.innerHTML = `<span class="emoji">🎉</span>${item.domanda.replace('🎉 ', '')}`;
            } else {
                tdDomanda.textContent = item.domanda;
            }
            tr.appendChild(tdDomanda);

            // Risposta - SENZA VIRGOLETTE, SENZA CORSIVO
            const tdRisposta = document.createElement('td');
            tdRisposta.className = 'col-risposta';
            tdRisposta.style.fontStyle = 'normal';
            
            if (item.tipo === 'inizio' || item.tipo === 'completata') {
                tdRisposta.textContent = item.risposta;
            } else {
                // Risposta normale: NIENTE virgolette!
                tdRisposta.textContent = item.risposta;
            }
            tr.appendChild(tdRisposta);

            // Esito
            const tdEsito = document.createElement('td');
            tdEsito.className = 'col-esito';

            if (item.tipo === 'inizio') {
                tdEsito.innerHTML = '<span style="color: #1565c0;">ℹ️ Info</span>';
            } else if (item.tipo === 'completata') {
                tdEsito.innerHTML = `<span class="esito-completata"><span class="emoji">🎉</span>PARTITA COMPLETATA!</span>`;
            } else if (item.esito === 'corretta') {
                tdEsito.innerHTML = `<span class="esito-corretta"><span class="check-icon">✓</span>Corretta</span>`;
            } else if (item.esito === 'errata') {
                tdEsito.innerHTML = `<span class="esito-errata"><span class="x-icon">✕</span>Errata</span>`;
            }
            tr.appendChild(tdEsito);

            // Ora
            const tdOra = document.createElement('td');
            tdOra.className = 'col-ora';
            tdOra.innerHTML = `${formattaOra(item.timestamp)}<span class="ora-data">${formattaData(item.timestamp)}</span>`;
            tr.appendChild(tdOra);

            tbody.appendChild(tr);
        });
    }

    function updateStats() {
        const squadreUniche = new Set(quizData.map(item => item.squadra));
        const risposteCorrette = quizData.filter(item => item.esito === 'corretta').length;
        const risposteErrate = quizData.filter(item => item.esito === 'errata').length;
        const partiteCompletate = quizData.filter(item => item.tipo === 'completata').length;
        const eventiTotali = quizData.filter(item => item.tipo === 'domanda').length;

        document.getElementById('statEventi').textContent = eventiTotali;
        document.getElementById('statCorrette').textContent = risposteCorrette;
        document.getElementById('statErrate').textContent = risposteErrate;
        document.getElementById('statCompletate').textContent = partiteCompletate;
        document.getElementById('statSquadre').textContent = squadreUniche.size;
    }

    function applicaFiltro() {
        renderTable();
    }

    function svuotaTutto() {
        if (confirm('Sei sicuro di voler svuotare tutti i risultati?')) {
            quizData.length = 0;
            renderTable();
            updateStats();
        }
    }

    // Inizializzazione
    renderTable();
    updateStats();
</script>

</body>
</html>
