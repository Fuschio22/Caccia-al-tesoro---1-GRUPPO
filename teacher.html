<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Dashboard Docente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .dashboard-header h1 {
            color: #1a2b5a;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 24px 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: transform 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: #2e7d32;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .filter-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .filter-container label {
            font-weight: 600;
            color: #333;
        }

        .filter-container select {
            padding: 10px 40px 10px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            background-color: white;
            cursor: pointer;
        }

        .btn-svuota {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .btn-svuota:hover {
            background-color: #c0392b;
        }

        .table-wrapper {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #1a2b5a;
        }

        thead th {
            color: white;
            padding: 18px 20px;
            text-align: left;
            font-size: 15px;
            font-weight: 700;
        }

        thead th:first-child { padding-left: 30px; }
        thead th:last-child { padding-right: 30px; }

        tbody tr {
            border-bottom: 1px solid #eef0f3;
        }

        tbody tr:hover {
            background-color: #f8f9fb;
        }

        td {
            padding: 16px 20px;
            font-size: 15px;
            line-height: 1.6;
            vertical-align: top;
        }

        td:first-child { padding-left: 30px; }
        td:last-child { padding-right: 30px; }

        .col-squadra {
            font-weight: 700;
            color: #333;
            white-space: nowrap;
        }

        .col-domanda {
            color: #444;
        }

        .col-risposta {
            font-style: normal;
            font-family: inherit;
            font-weight: 500;
            color: #444;
        }

        .col-esito {
            white-space: nowrap;
            font-weight: 700;
        }

        .col-ora {
            white-space: nowrap;
            font-size: 14px;
            color: #333;
            font-weight: 600;
        }

        .ora-data {
            display: block;
            font-size: 13px;
            color: #999;
            font-weight: 400;
            margin-top: 2px;
        }

        .row-inizio {
            background-color: #e3f2fd !important;
        }

        .row-inizio .col-domanda {
            color: #1565c0;
            font-weight: 700;
        }

        .row-completata {
            background-color: #e8f5e9 !important;
        }

        .row-completata .col-domanda {
            color: #2e7d32;
            font-weight: 700;
        }

        .row-errata {
            background-color: #fef0f0;
        }

        .esito-corretta {
            color: #2e7d32;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .check-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            background-color: #4caf50;
            border-radius: 4px;
            color: white;
            font-size: 14px;
        }

        .esito-errata {
            color: #c62828;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .x-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            background-color: #e53935;
            border-radius: 4px;
            color: white;
            font-size: 14px;
        }

        .esito-completata {
            color: #2e7d32;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .emoji {
            margin-right: 8px;
        }

        /* Pannello di test per simulare ricezione dati */
        .test-panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .test-panel h3 {
            margin-bottom: 15px;
            color: #1a2b5a;
        }

        .test-panel input, .test-panel select {
            padding: 8px 12px;
            margin: 5px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }

        .test-panel button {
            padding: 8px 20px;
            margin: 5px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .test-panel button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="dashboard-header">
        <h1>📊 Dashboard Docente</h1>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-number" id="statEventi">0</div>
            <div class="stat-label">Eventi totali</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="statCorrette">0</div>
            <div class="stat-label">Risposte corrette</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="statErrate">0</div>
            <div class="stat-label">Risposte errate</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="statCompletate">0</div>
            <div class="stat-label">Partite completate 🎉</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="statSquadre">0</div>
            <div class="stat-label">Squadre attive</div>
        </div>
    </div>

    <div class="filter-container">
        <label for="filtro">Filtra:</label>
        <select id="filtro" onchange="applicaFiltro()">
            <option value="tutti">Tutti gli eventi</option>
            <option value="inizio">Inizi partita</option>
            <option value="corrette">Risposte corrette</option>
            <option value="errate">Risposte errate</option>
            <option value="completate">Partite completate</option>
        </select>
    </div>

    <button class="btn-svuota" onclick="svuotaTutto()">
        <span>🗑</span> Svuota tutto
    </button>

    <!-- Pannello di test per simulare ricezione dati -->
    <div class="test-panel">
        <h3>🧪 Simula Ricezione Dati (per test)</h3>
        <input type="text" id="testSquadra" placeholder="Nome squadra" value="Squadra1">
        <input type="text" id="testDomanda" placeholder="Domanda" value="In quale città siamo?">
        <input type="text" id="testRisposta" placeholder="Risposta" value="venezia">
        <select id="testEsito">
            <option value="corretta">Corretta</option>
            <option value="errata">Errata</option>
        </select>
        <br>
        <button onclick="simulaInizioPartita()">🎮 Inizio Partita</button>
        <button onclick="simulaRisposta()">📝 Nuova Risposta</button>
        <button onclick="simulaPartitaCompletata()">🎉 Partita Completata</button>
    </div>

    <div class="table-wrapper">
        <table id="quizTable">
            <thead>
                <tr>
                    <th>Squadra</th>
                    <th>Domanda / Evento</th>
                    <th>Risposta</th>
                    <th>Esito</th>
                    <th>Ora</th>
                </tr>
            </thead>
            <tbody id="quizBody"></tbody>
        </table>
    </div>
</div>

<script>
    // ========== GESTIONE DATI CON LOCALSTORAGE ==========
    const STORAGE_KEY = 'quizDashboardData';

    // Carica dati da localStorage
    function caricaDati() {
        const dati = localStorage.getItem(STORAGE_KEY);
        return dati ? JSON.parse(dati) : [];
    }

    // Salva dati su localStorage
    function salvaDati(dati) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(dati));
    }

    // Inizializza dati
    let quizData = caricaDati();

    // ========== FUNZIONI PRINCIPALI ==========

    // FUNZIONE DA CHIAMARE QUANDO ARRIVA UNA RISPOSTA
    function riceviRisposta(squadra, domanda, risposta, esito) {
        // Verifica se la squadra ha già iniziato
        const haIniziato = quizData.some(item => 
            item.squadra === squadra && item.tipo === 'inizio'
        );

        // Se non ha iniziato, registra l'inizio
        if (!haIniziato) {
            registraInizioPartita(squadra);
        }

        const evento = {
            tipo: 'domanda',
            squadra: squadra,
            domanda: domanda,
            risposta: risposta,
            esito: esito,
            timestamp: new Date().toISOString()
        };

        quizData.push(evento);
        salvaDati(quizData);
        renderTable();
        updateStats();
    }

    // Registra inizio partita
    function registraInizioPartita(squadra) {
        const evento = {
            tipo: 'inizio',
            squadra: squadra,
            domanda: 'PARTITA INIZIATA',
            risposta: '-',
            esito: 'info',
            timestamp: new Date().toISOString()
        };

        quizData.push(evento);
        salvaDati(quizData);
    }

    // Registra partita completata
    function registraPartitaCompletata(squadra) {
        const evento = {
            tipo: 'completata',
            squadra: squadra,
            domanda: 'PARTITA COMPLETATA',
            risposta: 'Tutte le domande risposte correttamente',
            esito: 'completata',
            timestamp: new Date().toISOString()
        };

        quizData.push(evento);
        salvaDati(quizData);
        renderTable();
        updateStats();
    }

    // ========== FUNZIONI DI TEST (per simulare dati) ==========
    function simulaInizioPartita() {
        const squadra = document.getElementById('testSquadra').value || 'Squadra1';
        registraInizioPartita(squadra);
        renderTable();
        updateStats();
        alert(`✅ Partita iniziata per ${squadra}`);
    }

    function simulaRisposta() {
        const squadra = document.getElementById('testSquadra').value || 'Squadra1';
        const domanda = document.getElementById('testDomanda').value || 'Domanda di test';
        const risposta = document.getElementById('testRisposta').value || 'risposta';
        const esito = document.getElementById('testEsito').value;

        riceviRisposta(squadra, domanda, risposta, esito);
        alert(`✅ Risposta ricevuta: ${risposta} (${esito})`);
    }

    function simulaPartitaCompletata() {
        const squadra = document.getElementById('testSquadra').value || 'Squadra1';
        registraPartitaCompletata(squadra);
        alert(`✅ Partita completata da ${squadra}`);
    }

    // ========== RENDER E STATS ==========
    function formattaOra(isoString) {
        const data = new Date(isoString);
        return data.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    }

    function formattaData(isoString) {
        const data = new Date(isoString);
        return data.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function renderTable() {
        const tbody = document.getElementById('quizBody');
        const filtro = document.getElementById('filtro').value;
        tbody.innerHTML = '';

        let datiFiltrati = [...quizData];
        
        if (filtro !== 'tutti') {
            if (filtro === 'inizio') {
                datiFiltrati = datiFiltrati.filter(item => item.tipo === 'inizio');
            } else if (filtro === 'corrette') {
                datiFiltrati = datiFiltrati.filter(item => item.esito === 'corretta');
            } else if (filtro === 'errate') {
                datiFiltrati = datiFiltrati.filter(item => item.esito === 'errata');
            } else if (filtro === 'completate') {
                datiFiltrati = datiFiltrati.filter(item => item.tipo === 'completata');
            }
        }

        // Ordina per timestamp (più recente prima)
        datiFiltrati.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        datiFiltrati.forEach((item) => {
            const tr = document.createElement('tr');

            if (item.tipo === 'inizio') {
                tr.classList.add('row-inizio');
            } else if (item.tipo === 'completata') {
                tr.classList.add('row-completata');
            } else if (item.esito === 'errata') {
                tr.classList.add('row-errata');
            }

            // Squadra
            const tdSquadra = document.createElement('td');
            tdSquadra.className = 'col-squadra';
            tdSquadra.textContent = item.squadra;
            tr.appendChild(tdSquadra);

            // Domanda
            const tdDomanda = document.createElement('td');
            tdDomanda.className = 'col-domanda';
            if (item.tipo === 'inizio') {
                tdDomanda.innerHTML = `<span class="emoji">🎮</span>${item.domanda}`;
            } else if (item.tipo === 'completata') {
                tdDomanda.innerHTML = `<span class="emoji">🎉</span>${item.domanda}`;
            } else {
                tdDomanda.textContent = item.domanda;
            }
            tr.appendChild(tdDomanda);

            // Risposta - SENZA VIRGOLETTE, SENZA CORSIVO
            const tdRisposta = document.createElement('td');
            tdRisposta.className = 'col-risposta';
            tdRisposta.style.fontStyle = 'normal';
            tdRisposta.textContent = item.risposta; // NIENTE virgolette!
            tr.appendChild(tdRisposta);

            // Esito
            const tdEsito = document.createElement('td');
            tdEsito.className = 'col-esito';

            if (item.tipo === 'inizio') {
                tdEsito.innerHTML = '<span style="color: #1565c0;">ℹ️ Info</span>';
            } else if (item.tipo === 'completata') {
                tdEsito.innerHTML = `<span class="esito-completata"><span class="emoji">🎉</span>PARTITA COMPLETATA!</span>`;
            } else if (item.esito === 'corretta') {
                tdEsito.innerHTML = `<span class="esito-corretta"><span class="check-icon">✓</span>Corretta</span>`;
            } else if (item.esito === 'errata') {
                tdEsito.innerHTML = `<span class="esito-errata"><span class="x-icon">✕</span>Errata</span>`;
            }
            tr.appendChild(tdEsito);

            // Ora
            const tdOra = document.createElement('td');
            tdOra.className = 'col-ora';
            tdOra.innerHTML = `${formattaOra(item.timestamp)}<span class="ora-data">${formattaData(item.timestamp)}</span>`;
            tr.appendChild(tdOra);

            tbody.appendChild(tr);
        });
    }

    function updateStats() {
        const squadreUniche = new Set(quizData.map(item => item.squadra));
        const risposteCorrette = quizData.filter(item => item.esito === 'corretta').length;
        const risposteErrate = quizData.filter(item => item.esito === 'errata').length;
        const partiteCompletate = quizData.filter(item => item.tipo === 'completata').length;
        const eventiTotali = quizData.filter(item => item.tipo === 'domanda').length;

        document.getElementById('statEventi').textContent = eventiTotali;
        document.getElementById('statCorrette').textContent = risposteCorrette;
        document.getElementById('statErrate').textContent = risposteErrate;
        document.getElementById('statCompletate').textContent = partiteCompletate;
        document.getElementById('statSquadre').textContent = squadreUniche.size;
    }

    function applicaFiltro() {
        renderTable();
    }

    function svuotaTutto() {
        if (confirm('Sei sicuro di voler svuotare tutti i risultati?')) {
            quizData = [];
            salvaDati(quizData);
            renderTable();
            updateStats();
        }
    }

    // ========== API PUBBLICHE (da usare nel tuo backend/app) ==========
    // Queste funzioni possono essere chiamate dall'esterno:
    window.QuizDashboard = {
        riceviRisposta: riceviRisposta,
        registraInizioPartita: registraInizioPartita,
        registraPartitaCompletata: registraPartitaCompletata,
        getDati: () => quizData,
        aggiorna: () => {
            renderTable();
            updateStats();
        }
    };

    // Inizializzazione
    renderTable();
    updateStats();

    // Esempio: se hai dati iniziali, puoi caricarli così:
    // QuizDashboard.riceviRisposta('Squadra1', 'Domanda?', 'risposta', 'corretta');
</script>

</body>
</html>
