<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Risultati Partita</title>
    <style>
        /* ========== RESET & BASE ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        /* ========== CONTAINER PRINCIPALE ========== */
        .quiz-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ========== BOTTONE SVUOTA TUTTO ========== */
        .btn-svuota {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-bottom: 20px;
        }

        .btn-svuota:hover {
            background-color: #c0392b;
            transform: translateY(-1px);
        }

        .btn-svuota .icon-trash {
            font-size: 16px;
        }

        /* ========== TABELLA ========== */
        .table-wrapper {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        /* ========== HEADER DELLA TABELLA ========== */
        thead {
            background-color: #1a2b5a;
        }

        thead th {
            color: white;
            padding: 18px 20px;
            text-align: left;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        thead th:first-child {
            padding-left: 30px;
        }

        thead th:last-child {
            padding-right: 30px;
        }

        /* ========== RIGHE CORPO ========== */
        tbody tr {
            border-bottom: 1px solid #eef0f3;
            transition: background-color 0.2s ease;
        }

        tbody tr:hover {
            background-color: #f8f9fb;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        td {
            padding: 16px 20px;
            font-size: 15px;
            line-height: 1.6;
            vertical-align: top;
        }

        td:first-child {
            padding-left: 30px;
        }

        td:last-child {
            padding-right: 30px;
        }

        /* ========== COLONNA SQUADRA ========== */
        .col-squadra {
            font-weight: 700;
            color: #333;
            white-space: nowrap;
            min-width: 120px;
            font-size: 15px;
        }

        /* ========== COLONNA DOMANDA ========== */
        .col-domanda {
            color: #444;
            min-width: 300px;
            font-size: 15px;
            font-style: normal;
        }

        /* ========== RIGA PARTITA COMPLETATA ========== */
        .row-completata {
            background-color: #e8f5e9 !important;
        }

        .row-completata .col-squadra {
            color: #2e7d32;
        }

        .row-completata .col-domanda {
            color: #2e7d32;
            font-weight: 700;
            font-size: 16px;
        }

        .row-completata .col-domanda .emoji-completa {
            margin-right: 8px;
        }

        /* ========== COLONNA RISPOSTA ========== */
        .col-risposta {
            min-width: 250px;
            font-size: 15px;
            font-style: normal;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 500;
            color: #444;
            /* NESSUNA virgoletta, NESSUN corsivo */
        }

        .col-risposta.risposta-corretta {
            color: #2e7d32;
            font-weight: 600;
        }

        /* ========== COLONNA ESITO ========== */
        .col-esito {
            white-space: nowrap;
            min-width: 180px;
            font-weight: 700;
            font-size: 15px;
        }

        .esito-corretta {
            color: #2e7d32;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .esito-corretta .check-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            background-color: #4caf50;
            border-radius: 4px;
            color: white;
            font-size: 14px;
        }

        .esito-errata {
            color: #c62828;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .esito-errata .x-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            background-color: #e53935;
            border-radius: 4px;
            color: white;
            font-size: 14px;
        }

        .esito-completata {
            color: #2e7d32;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 16px;
        }

        .esito-completata .party-icon {
            font-size: 20px;
        }

        /* ========== COLONNA ORA ========== */
        .col-ora {
            white-space: nowrap;
            text-align: right;
            min-width: 120px;
            font-size: 14px;
            color: #333;
            font-weight: 600;
        }

        .col-ora .ora-data {
            display: block;
            font-size: 13px;
            color: #999;
            font-weight: 400;
            margin-top: 2px;
        }

        /* ========== RIGA ERRATA ========== */
        .row-errata {
            background-color: #fef0f0;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            table {
                display: block;
                overflow-x: auto;
            }

            thead th,
            td {
                padding: 12px 10px;
                font-size: 13px;
            }

            td:first-child {
                padding-left: 15px;
            }

            td:last-child {
                padding-right: 15px;
            }

            .col-domanda {
                min-width: 200px;
            }

            .col-risposta {
                min-width: 150px;
            }
        }
    </style>
</head>
<body>

<div class="quiz-container">

    <!-- Bottone Svuota Tutto -->
    <button class="btn-svuota" onclick="svuotaTutto()">
        <span class="icon-trash">🗑</span>
        Svuota tutto
    </button>

    <!-- Tabella Risultati -->
    <div class="table-wrapper">
        <table id="quizTable">
            <thead>
                <tr>
                    <th>Squadra</th>
                    <th>Domanda / Evento</th>
                    <th>Risposta</th>
                    <th>Esito</th>
                    <th>Ora</th>
                </tr>
            </thead>
            <tbody id="quizBody">
                <!-- Le righe vengono generate via JavaScript -->
            </tbody>
        </table>
    </div>

</div>

<script>
    // ========== DATI DEL QUIZ ==========
    const quizData = [
        {
            squadra: "dakjkhcd",
            domanda: " PARTITA COMPLETATA",
            risposta: "Tutte le domande risposte correttamente",
            esito: "completata",
            completata: true
        },
        {
            squadra: "dakjkhcd",
            domanda: "Terza domanda: Tra i personaggi seduti al banco, uno sembra rispondere alla chiamata: di chi si tratta?",
            risposta: "matteo",
            esito: "corretta"
        },
        {
            squadra: "dakjkhcd",
            domanda: "Seconda domanda: Chi è il personaggio sulla destra che sta indicando qualcosa?",
            risposta: "gesù",
            esito: "corretta"
        },
        {
            squadra: "dakjkhcd",
            domanda: "Prima domanda: Sulla destra è presente una finestra, ma la luce sembra arrivare da un altro luogo. Secondo te, cosa rappresenta quella luce?",
            risposta: "luce di dio",
            esito: "corretta"
        },
        {
            squadra: "dakjkhcd",
            domanda: "Prima domanda: Sulla destra è presente una finestra, ma la luce sembra arrivare da un altro luogo. Secondo te, cosa rappresenta quella luce?",
            risposta: "luce divi",
            esito: "errata"
        },
        {
            squadra: "dakjkhcd",
            domanda: "Seconda domanda: Probabilmente, chi è il volto sulla pelle?",
            risposta: "michelangelo",
            esito: "corretta"
        },
        {
            squadra: "dakjkhcd",
            domanda: "Prima domanda: Osserva attentamente l'immagine sulla Lim e leggi il racconto. Chi è l'uomo con una pelle sulla mano sinistra?",
            risposta: "bartolomeo",
            esito: "corretta"
        }
    ];

    // ========== ORA ATTUALE ==========
    const now = new Date();
    const oraFormatted = now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    const dataFormatted = now.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });

    // ========== RENDER TABELLA ==========
    function renderTable() {
        const tbody = document.getElementById('quizBody');
        tbody.innerHTML = '';

        quizData.forEach((item, index) => {
            const tr = document.createElement('tr');

            // Classe per riga completata o errata
            if (item.completata) {
                tr.classList.add('row-completata');
            } else if (item.esito === 'errata') {
                tr.classList.add('row-errata');
            }

            // --- Colonna Squadra ---
            const tdSquadra = document.createElement('td');
            tdSquadra.className = 'col-squadra';
            tdSquadra.textContent = item.squadra;
            tr.appendChild(tdSquadra);

            // --- Colonna Domanda ---
            const tdDomanda = document.createElement('td');
            tdDomanda.className = 'col-domanda';

            if (item.completata) {
                tdDomanda.innerHTML = `<span class="emoji-completa">🎉</span>${item.domanda.replace('🎉 ', '')}`;
            } else {
                tdDomanda.textContent = item.domanda;
            }

            tr.appendChild(tdDomanda);

            // --- Colonna Risposta ---
            // NESSUNA virgoletta, NESSUN corsivo — stesso font della domanda
            const tdRisposta = document.createElement('td');
            tdRisposta.className = 'col-risposta';

            if (item.completata) {
                tdRisposta.textContent = `"${item.risposta}"`;
                tdRisposta.style.fontStyle = 'normal';
            } else {
                // Risposta normale: NIENTE virgolette, NIENTE corsivo
                tdRisposta.textContent = item.risposta;
                tdRisposta.style.fontStyle = 'normal';
            }

            tr.appendChild(tdRisposta);

            // --- Colonna Esito ---
            const tdEsito = document.createElement('td');
            tdEsito.className = 'col-esito';

            if (item.completata) {
                tdEsito.innerHTML = `<span class="esito-completata"><span class="party-icon">🎉</span>PARTITA COMPLETATA!</span>`;
            } else if (item.esito === 'corretta') {
                tdEsito.innerHTML = `<span class="esito-corretta"><span class="check-icon">✓</span>Corretta</span>`;
            } else if (item.esito === 'errata') {
                tdEsito.innerHTML = `<span class="esito-errata"><span class="x-icon">✕</span>Errata</span>`;
            }

            tr.appendChild(tdEsito);

            // --- Colonna Ora ---
            const tdOra = document.createElement('td');
            tdOra.className = 'col-ora';
            tdOra.innerHTML = `${oraFormatted}<span class="ora-data">${dataFormatted}</span>`;
            tr.appendChild(tdOra);

            tbody.appendChild(tr);
        });
    }

    // ========== FUNZIONE SVUOTA TUTTO ==========
    function svuotaTutto() {
        if (confirm('Sei sicuro di voler svuotare tutti i risultati?')) {
            quizData.length = 0;
            renderTable();
        }
    }

    // ========== INIZIALIZZAZIONE ==========
    renderTable();
</script>

</body>
</html>
